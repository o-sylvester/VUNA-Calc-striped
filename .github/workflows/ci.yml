name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

  build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: vuna-calc:latest

      - run: docker save vuna-calc:latest | gzip > vuna-calc.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: vuna-calc.tar.gz
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          lftp -c "
            set ftp:ssl-allow true
            set ssl:verify-certificate no
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }}
            mirror -R . / \
              --exclude .git/ --exclude .gitignore --exclude .github/ \
              --exclude .dockerignore --exclude node_modules/ --exclude test/ \
              --exclude eslint.config.mjs --exclude jest.config.js \
              --exclude Dockerfile --exclude nginx.conf \
              --exclude package.json --exclude package-lock.json
          "
        shell: bash
